    <div class="main-wrapper">
	    <section class="cta-section theme-bg-light py-5">
		    <div class="container text-center single-col-max-width">
			    <h2 class="heading">Contact</h2>
			    <div class="intro">
			    <p>Got a question? Reach out! I'm always happy to connect.</p>
	            </div>
			</div><!--//container-->
	    </section>
	    <section class="contact-section px-3 py-5 p-md-5">
		    <div class="container">

				<!-- Your Form -->
				<form id="contact-form" class="contact-form col-lg-8 mx-lg-auto" enctype="multipart/form-data">
					<h3 class="text-center mb-3">Get In Touch</h3>
					<div class="row g-3">
						<div class="col-12 col-md-6">
							<label class="sr-only" for="cname">Name</label>
							<input type="text" class="form-control" id="cname" name="fi-sender-fullName" placeholder="Name" minlength="2" required="" aria-required="true">
						</div>
						<div class="col-12 col-md-6">
							<label class="sr-only" for="cemail">Email</label>
							<input type="email" class="form-control" id="cemail" name="fi-sender-email" placeholder="Email" required="" aria-required="true">
						</div>
						<div class="col-12">
							<label class="sr-only" for="cmessage">Your message</label>
							<textarea class="form-control" id="cmessage" name="fi-text-message" placeholder="Enter your message" rows="10" required="" aria-required="true"></textarea>
						</div>
						 <div class="form-group col-12">
							<button type="submit" class="btn btn-block btn-primary py-2">Send Now</button>
						</div>
					</div><!--//form-row-->
				<!-- tracking: auto-captured by the SDK from URL params and referrer -->
				<p id="form-status"></p>
				</form>

				<script>
				const forminit = new Forminit();
				const FORM_ID = "d775qpt1lwb";

				document.getElementById("contact-form").addEventListener("submit", async (e) => {
					e.preventDefault();

					const formData = new FormData(e.target);
					const { data, error } = await forminit.submit(FORM_ID, formData);

					const status = document.getElementById("form-status");

					if (error) {
					status.textContent = error.message;
					return;
					}

					status.textContent = "Message sent successfully!";
					e.target.reset();
				});
				</script>
		    </div><!--//container-->
	    </section>
